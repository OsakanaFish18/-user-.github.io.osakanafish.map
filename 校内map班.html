</div>

<button onclick="findRoute()">案内開始</button>

<div id="result"></div>

</div>

<script>

let pyodide;

async function init(){
pyodide = await loadPyodide();
}

init();

async function findRoute(){

let start = document.getElementById("start").value;
let end = document.getElementById("end").value;

let code = `
graph = {

"0401":["0402","階段1"],
"0402":["0401","0403"],
"0403":["0402","0404"],
"0404":["0403","0405"],
"0405":["0404","0406"],

"0201":["0202","階段5"],
"0202":["0201","0203"],
"0203":["0202","0204"],
"0204":["0203","0205"],
"0205":["0204","0206"],
"0206":["0205","0207"],
"0207":["0206","0208"],
"0208":["0207","階段6"],

"0101":["0102","階段7"],
"0102":["0101","0103"],
"0103":["0102","0104"],
"0104":["0103","0105"],
"0105":["0104","0106"],
"0106":["0105","昇降口"],

"階段1":["0401","階段3"],
"階段2":["0407","階段4"],
"階段3":["階段1","0301","階段5"],
"階段4":["階段2","0307","階段6"],
"階段5":["階段3","0201","階段7"],
"階段6":["階段4","0208","階段8"],
"階段7":["階段5","0101"],
"階段8":["階段6","玄関"],

"玄関":["階段8"],
"昇降口":["0106"]

}

from collections import deque

def find_route(start,end):

    queue = deque([[start]])
    visited = set()

    while queue:

        path = queue.popleft()
        node = path[-1]

        if node == end:
            return path

        if node not in visited:

            visited.add(node)

            for nxt in graph.get(node,[]):
                new_path = list(path)
                new_path.append(nxt)
                queue.append(new_path)

    return ["ルートなし"]

result = find_route("${start}","${end}")
" ↓ ".join(result)
`;

let result = await pyodide.runPythonAsync(code);

document.getElementById("result").innerHTML = result;

}
